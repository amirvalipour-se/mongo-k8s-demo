## Purpose: Kubernetes Secret containing MongoDB credentials (base64-encoded)
##
## Notes:
## - To update credentials: edit this file (with new base64 values) and
##   `kubectl apply -f secret-mongo.yaml` OR use `kubectl create secret --from-literal`.
## - Avoid committing real credentials to version control.
##
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
type: Opaque # default type for arbitrary key-value pairs
data:
  mongo-username: bW9uZ291c2Vy
  mongo-password: bW9uZ29wYXNzd29yZA==